apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: myapp.com
    http:
      paths:
      # API routes → Django
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000

      # Django admin static
      - path: /static/admin
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000

      # DRF static
      - path: /static/rest_framework
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000

      # Frontend (SPA)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
